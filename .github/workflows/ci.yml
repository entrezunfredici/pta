name: ci-cd

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-cd-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            app/requirements.txt
            app/requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r app/requirements.txt
          pip install -r app/requirements-dev.txt

      - name: Lint
        run: |
          cd app
          ruff check .

      - name: Format check
        run: |
          cd app
          ruff format --check .

      - name: Type check
        run: |
          cd app
          mypy .

      - name: Django checks
        run: |
          python app/manage.py check
          python app/manage.py test

  docker:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    needs: [validate]
    env:
      IMAGE_NAME: ${{ vars.DOCKER_IMAGE_NAME || format('{0}/ptw-web', secrets.DOCKERHUB_USERNAME) }}
      IMAGE_TAG: ${{ github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: app
          file: app/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
            ${{ env.IMAGE_NAME }}:latest

  deploy:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    needs: [docker]
    env:
      IMAGE_NAME: ${{ vars.DOCKER_IMAGE_NAME || format('{0}/ptw-web', secrets.DOCKERHUB_USERNAME) }}
      IMAGE_TAG: ${{ github.sha }}
      K8S_NAMESPACE: ptw
      DJANGO_ALLOWED_HOSTS: ${{ vars.DJANGO_ALLOWED_HOSTS || '*' }}
      DJANGO_DEBUG: ${{ vars.DJANGO_DEBUG || '0' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p "$HOME/.kube"
          echo "${{ secrets.KUBE_CONFIG_B64 }}" | base64 --decode > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      - name: Ensure namespace
        run: kubectl apply -f k8s/namespace.yaml

      - name: Apply runtime secrets
        run: |
          kubectl -n "$K8S_NAMESPACE" create secret generic django-env \
            --from-literal=DJANGO_SECRET_KEY='${{ secrets.DJANGO_SECRET_KEY }}' \
            --from-literal=DJANGO_ALLOWED_HOSTS="$DJANGO_ALLOWED_HOSTS" \
            --from-literal=DJANGO_DEBUG="$DJANGO_DEBUG" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply manifests
        run: |
          sed "s|__IMAGE__|$IMAGE_NAME:$IMAGE_TAG|g" k8s/deployment.yaml | kubectl apply -f -
          kubectl apply -f k8s/service.yaml

      - name: Wait for rollout
        run: |
          kubectl -n "$K8S_NAMESPACE" rollout status deployment/ptw-web --timeout=180s
